<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
    }

    /* Waiting state — subtle pulsing text */
    .idle {
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 3px;
      color: #1a1a1a;
      text-transform: uppercase;
      animation: idlePulse 2s ease-in-out infinite;
      position: relative;
      z-index: 1;
    }

    @keyframes idlePulse {
      0%, 100% { color: #1a1a1a; }
      50%       { color: #2e2e2e; }
    }

    /* Jumpscare overlay — hidden until triggered */
    .scare {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .scare.active { display: flex; }

    .scare img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      /* rapid shake */
      animation: shake 0.08s linear infinite;
    }

    @keyframes shake {
      0%   { transform: translate(0,       0); }
      20%  { transform: translate(-6px,  4px); }
      40%  { transform: translate(6px,  -4px); }
      60%  { transform: translate(-4px, -6px); }
      80%  { transform: translate(4px,   6px); }
      100% { transform: translate(0,       0); }
    }
  </style>
</head>
<body>

  <!-- Put your jumpscare image at images/jumpscare.png -->
  <!-- Put your jumpscare audio at audio/jumpscare.mp3 (or .ogg) -->
  <audio id="scareAudio">
    <source src="audio/jumpscare.mp3" type="audio/mpeg" />
    <source src="audio/jumpscare.ogg" type="audio/ogg" />
  </audio>

  <div class="idle" id="idle">// ...</div>

  <div class="scare" id="scare">
    <img src="images/jumpscare.png" alt="" />
  </div>

  <script>
    let fired = false;

    function trigger() {
      if (fired) return;
      fired = true;

      // Hide idle text
      document.getElementById('idle').style.display = 'none';

      // Blast the audio loud
      const audio = document.getElementById('scareAudio');
      audio.volume = 1.0;
      audio.play().catch(() => {});

      // Show the jumpscare image
      document.getElementById('scare').classList.add('active');

      // After 1 second, redirect to main page
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 1500);
    }

    // Any interaction fires the jumpscare
    document.addEventListener('click',     trigger);
    document.addEventListener('keydown',   trigger);
    document.addEventListener('touchstart', trigger);
  </script>

</body>
</html>
